<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sacred Clock - The Sacred Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⏰ Sacred Clock</h1>
        
        <div class="clock">
            <div class="year-section">
                <span class="label">Year</span>
                <span class="year" id="year">1350</span>
            </div>
            
            <div class="time-section">
                <span class="label">Time</span>
                <span class="time" id="time">00:00:00</span>
            </div>
        </div>
        
        <div class="info">
            <p>⚡ 3 days = 1 year</p>
            <p id="days-info">Days elapsed: 0</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
